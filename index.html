<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEOBOX 24/7</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #0f172a; color: white; }
    header { padding: 20px; text-align: center; font-size: 28px; font-weight: bold; }
    .hero { text-align: center; padding: 60px 20px; }
    .hero h1 { font-size: 36px; }
    .hero p { color: #94a3b8; }
    .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 40px; }
    .card { background: #1e293b; padding: 20px; border-radius: 12px; text-align: center; }
    .card h3 { margin-bottom: 10px; }
    .btn { background: #22c55e; padding: 10px 20px; border-radius: 8px; color: black; text-decoration: none; display: inline-block; margin-top: 10px; }
    footer { text-align: center; padding: 20px; color: #64748b; }
  </style>
</head>
<body><header>NEOBOX 24/7</header><section class="hero">
  <h1>Productos que necesitas. Cuando los necesitas.</h1>
  <p>Tienda 24/7 inspirada en vending moderno.</p>
</section><section class="products">
  <div class="card">
    <h3>Pack Emergencia 🔋</h3>
    <p>Cargador + cable</p>
    <p><strong>7€</strong></p>
    <a href="#" class="btn">Comprar</a>
  </div>  <div class="card">
    <h3>Pack Noche 🌙</h3>
    <p>Papers + mechero</p>
    <p><strong>5€</strong></p>
    <a href="#" class="btn">Comprar</a>
  </div>  <div class="card">
    <h3>Pack Snack 🍫</h3>
    <p>Bebida + snack</p>
    <p><strong>4€</strong></p>
    <a href="#" class="btn">Comprar</a>
  </div>
</section><footer>
  © 2026 NEOBOX 24/7 - Tienda experimental
</footer></body>
</html>
